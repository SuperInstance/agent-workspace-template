# GitHub Action: Automated PR Review
# When a PR is opened, routes it through the available agents for review.
name: Agent PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install agents
        run: npm install -g opencode @anthropic-ai/claude-code

      - name: Diff summary
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }} --stat > /tmp/diff-stat.txt

      - name: Review with Claude Code
        run: |
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }})
          claude --print -p "Review this PR diff:\n\n${DIFF}\n\nFocus on: correctness, edge cases, safety. Be concise." > /tmp/review-output.md 2>&1

      - name: Post review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review-output.md', 'utf8');
            const truncated = review.length > 60000
              ? review.substring(0, 60000) + '\n\n... (truncated)'
              : review;
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body: `## Automated Code Review\n\n${truncated}`,
              event: 'COMMENT'
            });
